name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cache CMake _deps
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: ${{ runner.os }}-cmake-deps-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-cmake-deps-

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DDUPCLEANER_BUILD_TESTS=ON -DDUPCLEANER_BUILD_GUI=OFF

    - name: Build
      run: cmake --build build --config Release

    - name: Test
      run: ctest --test-dir build -C Release --output-on-failure -LE performance

  sanitizer-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y clang
        
    - name: Configure CMake with Sanitizers
      env:
        CC: clang
        CXX: clang++
      run: >
        cmake -S . -B build 
        -DCMAKE_BUILD_TYPE=Debug 
        -DDUPCLEANER_BUILD_TESTS=ON 
        -DDUPCLEANER_BUILD_GUI=OFF
        -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" 
        -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" 
        -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

    - name: Build
      run: cmake --build build --config Debug

    - name: Run Tests with Sanitizers
      env:
        ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1"
        UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
      run: ctest --test-dir build -C Debug --output-on-failure -LE performance

  static-analysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy cppcheck

    - name: Configure CMake
      run: cmake -S . -B build -DDUPCLEANER_BUILD_TESTS=OFF -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Run clang-tidy
      run: |
        # Run clang-tidy on all cpp files in src/
        find src/core src/cli -name "*.cpp" | xargs clang-tidy -p build/

    - name: Run cppcheck
      run: |
        cppcheck --project=build/compile_commands.json --enable=warning,performance,portability --suppress=missingIncludeSystem --inline-suppr --error-exitcode=1 src/core/ src/cli/ include/

  build-gui:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev xorg-dev libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libwayland-dev libxkbcommon-dev wayland-protocols

    - name: Cache CMake _deps
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: ${{ runner.os }}-cmake-deps-gui-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-cmake-deps-gui-
          ${{ runner.os }}-cmake-deps-

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DDUPCLEANER_BUILD_TESTS=OFF -DDUPCLEANER_BUILD_GUI=ON

    - name: Build
      run: cmake --build build --config Release --target dupcleaner_gui
